<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slovakiana – Výber hier</title>
  <style>
    :root {
      --bg: #0c1118;
      --text: #ffffff;
      --muted: rgba(255,255,255,0.82);
      --shadow: 0 18px 50px rgba(0,0,0,0.35);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body {
      min-height: 100vh;
    }

    .hero {
      position: relative;
      min-height: 88vh;
      background:
        linear-gradient(rgba(7, 11, 16, 0.42), rgba(7, 11, 16, 0.68)),
        url('pozadie.jpg') center/cover no-repeat;
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.18) 50%, rgba(0,0,0,0.42) 100%);
      pointer-events: none;
    }

    .topbar {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding: 18px 28px;
      background: linear-gradient(to bottom, rgba(10,14,20,0.9), rgba(10,14,20,0.55));
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .brand-mark {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
    }

    .brand-mark img {
      height: 36px;
      display: block;
    }

    .nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 20px;
      font-size: 14px;
      font-weight: 700;
    }

    .nav a {
      color: var(--text);
      text-decoration: none;
      opacity: 0.92;
    }

    .nav a:hover {
      opacity: 1;
      text-decoration: underline;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 1100px;
      margin: 0 auto;
      padding: 90px 20px 40px;
      text-align: center;
    }

    .hero h1 {
      max-width: 980px;
      margin: 0 auto 18px;
      font-size: clamp(34px, 4.8vw, 64px);
      line-height: 1.12;
      text-shadow: 0 8px 28px rgba(0,0,0,0.45);
    }

    .hint {
      margin-top: 30px;
      color: rgba(255,255,255,0.9);
      font-size: 17px;
      font-weight: 700;
    }

    .random-btn {
      display: inline-block;
      margin-top: 16px;
      padding: 14px 28px;
      border-radius: 14px;
      background: rgba(255,255,255,0.92);
      color: #111;
      text-decoration: none;
      font-weight: 800;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    .section {
      position: relative;
      z-index: 3;
      max-width: 1400px;
      margin: -290px auto 0;
      padding: 0 12px 36px;
    }

    .tiles {
      display: grid;
      grid-template-columns: repeat(3, minmax(260px, 1fr));
      gap: 14px;
    }

    .tile {
      position: relative;
      min-height: 255px;
      border-radius: 18px;
      overflow: hidden;
      text-decoration: none;
      color: white;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: var(--shadow);
      background-size: cover;
      background-position: center;
      transform: translateY(0);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .tile:hover {
      transform: translateY(-4px);
      box-shadow: 0 22px 55px rgba(0,0,0,0.42);
    }

    .tile::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.84) 0%, rgba(0,0,0,0.18) 55%, rgba(0,0,0,0.06) 100%);
    }

    .tile-content {
      position: absolute;
      inset: auto 0 0 0;
      z-index: 1;
      padding: 20px;
    }

    .tile h2 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.1;
    }

    .tile p {
      margin: 0 0 16px;
      color: rgba(255,255,255,0.88);
      line-height: 1.5;
      min-height: 46px;
    }

    .chip {
      display: inline-block;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.18);
      font-size: 14px;
      font-weight: 700;
      backdrop-filter: blur(4px);
    }

    @media (max-width: 980px) {
      .topbar {
        flex-direction: column;
        align-items: flex-start;
      }

      .nav {
        justify-content: flex-start;
        gap: 14px;
      }

      .tiles {
        grid-template-columns: 1fr;
      }

      .section {
        margin-top: 18px;
      }
    }

    @media (max-width: 640px) {
      .hero-content {
        padding-top: 56px;
      }
    }
  </style>
</head>
<body>
  <header class="hero">
    <div class="topbar">
      <a class="brand-mark" href="https://slovakiana.sk" target="_blank" rel="noopener noreferrer">
        <img src="logo.png" alt="Slovakiana logo">
      </a>

      
    </div>

    <div class="hero-content">
      <h1>Objav digitálne hry<br>
	  a interaktívny obsah<br> 
	  na Slovakiane</h1>
      
    </div>
  </header>

  <main class="section" id="hry">
    <div class="tiles">
      <a class="tile" href="https://slovakiana-puzle.netlify.app" target="_blank" rel="noopener noreferrer" style="background-image: url('puzzle.gif');">
        <div class="tile-content">
          <h2>Puzzle</h2>
          <p>Zvoľ si úroveň a poskladaj zbierkový predmet z múzea</p>
          <span class="chip">Spustiť hru</span>
        </div>
      </a>

      <a class="tile" href="https://slovakiana-semenarenn.netlify.app" target="_blank" rel="noopener noreferrer" style="background-image: url('semenaren.gif');">
        <div class="tile-content">
          <h2>Semenáreň</h2>
          <p>Priraď semienko do správneho obalu podľa obrázka rastliny.</p>
          <span class="chip">Spustiť hru</span>
        </div>
      </a>

      <a class="tile" href="https://slovakiana-panoo.netlify.app" target="_blank" rel="noopener noreferrer" style="background-image: url('pano.gif');">
        <div class="tile-content">
          <h2>Hľadaj objekt</h2>
          <p>Nájdi zbierkový predmet na výstave podľa nápovede.</p>
          <span class="chip">Spustiť hru</span>
        </div>
      </a>
    </div>
  </main>
</body>
</html>
